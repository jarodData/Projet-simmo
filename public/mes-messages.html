<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages — SIMMo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body style="background:#f8fafc">

<div style="max-width:700px;margin:0 auto;padding:16px">

    <!-- Header -->
    <div class="d-flex align-items-center gap-3 mb-4 mt-3">
        <a href="javascript:history.back()" class="btn btn-light btn-sm">
            <i class="bi bi-arrow-left"></i>
        </a>
        <h5 class="fw-bold mb-0">Mes conversations</h5>
    </div>

    <!-- Liste -->
    <div id="listeConversations">
        <div class="text-center py-5">
            <div class="spinner-border text-primary"></div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>
// ✅ Attend que tout soit chargé
document.addEventListener('DOMContentLoaded', function() {

    // Vérification connexion
    if (!getToken()) {
        localStorage.removeItem('redirect_after_login')
        window.location.href = estAgent() ? 'login-agent.html' : 'login.html'
        return
    }

    chargerConversations()
})

async function chargerConversations() {
    const container = document.getElementById('listeConversations')

    const conversations = await apiRequest('/conversations', 'GET', null, true)

    if (!conversations || conversations.length === 0) {
        container.innerHTML = `
            <div class="text-center py-5 text-muted">
                <i class="bi bi-chat-dots fs-2 d-block mb-2 opacity-25"></i>
                <p>Aucune conversation</p>
            </div>`
        return
    }

    container.innerHTML = conversations.map(c => {
        const inter  = c.interlocuteur || {}
        const prenom = inter.prenom || 'Utilisateur'
        const nom    = inter.nom || ''
        const nonLus = c.non_lus || 0
        const date   = c.dernier_message_at
            ? new Date(c.dernier_message_at).toLocaleDateString('fr-FR', {
                day: '2-digit', month: 'short'
              })
            : ''

        return `
            <a href="chats.html?conversation_id=${c.id}"
               class="text-decoration-none text-dark">
                <div class="d-flex align-items-center gap-3 p-3 rounded-3 mb-2"
                    style="background:${nonLus > 0
                        ? 'rgba(37,99,235,0.08)'
                        : 'white'};border:1px solid #e2e8f0">
                    <div class="bg-primary text-white rounded-circle flex-shrink-0
                        d-flex align-items-center justify-content-center fw-bold"
                        style="width:44px;height:44px;font-size:16px">
                        ${prenom[0]?.toUpperCase() || 'U'}
                    </div>
                    <div class="flex-grow-1" style="min-width:0">
                        <div class="d-flex justify-content-between">
                            <p class="fw-semibold small mb-0">
                                ${prenom} ${nom}
                                ${nonLus > 0
                                    ? `<span class="badge bg-danger ms-1">${nonLus}</span>`
                                    : ''}
                            </p>
                            <small class="text-muted">${date}</small>
                        </div>
                        <p class="text-muted small text-truncate mb-0">
                            ${c.dernier_message || 'Nouvelle conversation'}
                        </p>
                        ${c.annonce
                            ? `<p class="text-muted mb-0" style="font-size:11px">
                                <i class="bi bi-house me-1"></i>${c.annonce.titre || ''}
                               </p>`
                            : ''}
                    </div>
                    <i class="bi bi-chevron-right text-muted"></i>
                </div>
            </a>`
    }).join('')
}

chargerConversations()
</script>
</body>
</html>
