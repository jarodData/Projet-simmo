<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Messages — SIMMo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <style>
        .conv-item {
            border-radius : 12px;
            border        : 1px solid #e2e8f0;
            padding       : 16px;
            margin-bottom : 10px;
            background    : white;
            cursor        : pointer;
            transition    : all 0.2s;
            text-decoration: none;
            color          : inherit;
            display        : block;
        }
        .conv-item:hover {
            border-color : #2563eb;
            box-shadow   : 0 4px 12px rgba(37,99,235,0.1);
            color        : inherit;
        }
        .conv-item.non-lu {
            background   : #eff6ff;
            border-color : #93c5fd;
        }
        .avatar {
            width          : 46px;
            height         : 46px;
            border-radius  : 50%;
            background     : #2563eb;
            color          : white;
            display        : flex;
            align-items    : center;
            justify-content: center;
            font-weight    : bold;
            font-size      : 16px;
            flex-shrink    : 0;
        }
        .apercu {
            font-size  : 13px;
            color      : #64748b;
            white-space: nowrap;
            overflow   : hidden;
            text-overflow: ellipsis;
            max-width  : 300px;
        }
        .date-msg {
            font-size  : 11px;
            color      : #94a3b8;
            white-space: nowrap;
        }
        .annonce-info {
            font-size    : 11px;
            color        : #64748b;
            background   : #f8fafc;
            border-radius: 6px;
            padding      : 4px 8px;
            margin-top   : 6px;
            display      : inline-block;
        }
    </style>
</head>
<body style="background:#f8fafc">

<nav class="navbar navbar-expand-lg navbar-light bg-white sticky-top border-bottom">
    <div class="container">
        <a class="navbar-brand fw-bold fs-4" href="index.html">
            <i class="bi bi-buildings text-primary me-1"></i>SIMMo
        </a>
        <div class="d-flex gap-2" id="navAuth"></div>
    </div>
</nav>

<div class="container py-4" style="max-width:720px">

    <!-- En-tête -->
    <div class="d-flex align-items-center gap-3 mb-4">
        <a href="index.html" class="btn btn-light btn-sm">
            <i class="bi bi-arrow-left"></i>
        </a>
        <div>
            <h4 class="fw-bold mb-0">
                <i class="bi bi-chat-dots text-primary me-2"></i>
                Mes Messages
            </h4>
            <p class="text-muted small mb-0" id="nbConvs"></p>
        </div>
    </div>

    <!-- Alertes -->
    <div id="alertContainer"></div>

    <!-- Liste conversations -->
    <div id="listeConversations">
        <div class="text-center py-5">
            <div class="spinner-border text-primary"></div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>

// ── Vérification connexion ───────────────────────────────────
const token = getToken()
const user  = getUser()

if (!token || !user) {
    localStorage.setItem('redirect_after_login', location.href)
    window.location.href = 'login.html'
}

// ── Init ─────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function () {
    initNavbar()
    chargerConversations()

    // Rafraîchir toutes les 10 secondes
    setInterval(chargerConversations, 10000)
})

// ── Charger les conversations ────────────────────────────────
async function chargerConversations() {
    try {
        const conversations = await apiRequest('/conversations', 'GET', null, true)
        if (!conversations) return

        const convs = Array.isArray(conversations) ? conversations : []

        const nbNonLus = convs.reduce((t, c) => t + (c.non_lus || 0), 0)

        document.getElementById('nbConvs').textContent =
            convs.length + ' conversation(s)' +
            (nbNonLus > 0 ? ` — ${nbNonLus} non lu(s)` : '')

        afficherConversations(convs)

    } catch (e) {
        console.error('Erreur conversations:', e)
    }
}

// ── Afficher la liste ────────────────────────────────────────
function afficherConversations(convs) {
    const container = document.getElementById('listeConversations')

    if (!convs || convs.length === 0) {
        container.innerHTML = `
            <div class="text-center py-5 text-muted">
                <i class="bi bi-chat-dots display-3 d-block mb-3 opacity-25"></i>
                <h5>Aucune conversation</h5>
                <p class="small">Contactez un agent depuis une annonce pour démarrer.</p>
                <a href="annonces.html" class="btn btn-primary mt-2">
                    Parcourir les annonces
                </a>
            </div>`
        return
    }

    container.innerHTML = convs.map(c => {
        const inter    = c.interlocuteur || {}
        const prenom   = inter.prenom || inter.name || 'Agent'
        const nom      = inter.nom    || ''
        const initiale = prenom[0]?.toUpperCase() || 'A'
        const nonLus   = c.non_lus || 0
        const apercu   = c.dernier_message || '<em>Démarrer la conversation</em>'
        const date     = c.dernier_message_at
            ? formaterDate(c.dernier_message_at)
            : ''

        return `
            <a href="chat.html?conversation_id=${c.id}"
               class="conv-item ${nonLus > 0 ? 'non-lu' : ''}">
                <div class="d-flex align-items-start gap-3">

                    <!-- Avatar -->
                    <div class="avatar">${initiale}</div>

                    <!-- Contenu -->
                    <div class="flex-grow-1" style="min-width:0">
                        <div class="d-flex justify-content-between align-items-center mb-1">
                            <p class="fw-semibold mb-0">
                                ${prenom} ${nom}
                                ${nonLus > 0
                                    ? `<span class="badge bg-danger ms-1"
                                        style="font-size:10px">${nonLus}</span>`
                                    : ''}
                            </p>
                            <span class="date-msg">${date}</span>
                        </div>

                        <p class="apercu mb-0">${apercu}</p>

                        ${c.annonce ? `
                            <span class="annonce-info">
                                <i class="bi bi-house me-1"></i>
                                ${c.annonce.titre || ''}
                                — ${formatPrix(c.annonce.prix)}
                            </span>` : ''}
                    </div>

                    <!-- Flèche -->
                    <i class="bi bi-chevron-right text-muted flex-shrink-0 mt-1"></i>
                </div>
            </a>`
    }).join('')
}

// ── Helpers ──────────────────────────────────────────────────
function formaterDate(dateStr) {
    const d    = new Date(dateStr)
    const now  = new Date()
    const diff = now - d

    if (diff < 60000)        return 'À l\'instant'
    if (diff < 3600000)      return Math.floor(diff / 60000) + ' min'
    if (diff < 86400000)     return Math.floor(diff / 3600000) + 'h'
    if (diff < 604800000)    return Math.floor(diff / 86400000) + 'j'

    return d.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short' })
}

</script>
</body>
</html>
