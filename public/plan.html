<!DOCTYPE html>
<html lang="fr">
<head>
    <link rel="shortcut icon" href="favicon.png" type="image/png"> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- ✅ Colle ce bloc dans le <head> de TOUTES tes pages HTML -->

<!-- PWA Simmo -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#4F46E5">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Simmo">
<link rel="apple-touch-icon" href="/images/icon-192.png">


    <title>Mon Plan — SIMMo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-light bg-white sticky-top border-bottom">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">
            <i class="bi bi-buildings text-primary me-1"></i>SIMm<span class="text-primary">o</span>
        </a>
        <div id="navAuth"></div>
    </div>
</nav>

<div class="container py-5">
    <div class="row g-4">

        <!-- SIDEBAR -->
        <div class="col-12 col-lg-3">
            <div class="sidebar">
                <p class="small fw-bold text-muted text-uppercase px-2 mb-2">Espace Agent</p>
                <nav class="nav flex-column gap-1">
                    <a class="nav-link" href="dashboard.html"><i class="bi bi-grid me-2"></i>Dashboard</a>
                    <a class="nav-link" href="mes-annonces.html"><i class="bi bi-house me-2"></i>Mes annonces</a>
                    <a class="nav-link" href="mes-contacts.html"><i class="bi bi-chat-dots me-2"></i>Mes contacts</a>
                    <a class="nav-link active" href="plan.html"><i class="bi bi-credit-card me-2"></i>Mon plan</a>
                    <hr>
                    <button class="nav-link text-danger border-0 bg-transparent text-start w-100" onclick="deconnexion()">
                        <i class="bi bi-box-arrow-right me-2"></i>Déconnexion
                    </button>
                </nav>
            </div>
        </div>

        <!-- CONTENU -->
        <div class="col-12 col-lg-9">
            <h3 class="fw-bold mb-4">Mon abonnement</h3>

            <div id="alertContainer"></div>

            <!-- Plan actuel -->
            <div id="monPlanActuel" class="mb-5">
                <div class="text-center py-3">
                    <div class="spinner-border text-primary"></div>
                </div>
            </div>

            <!-- Tous les plans -->
            <h5 class="fw-bold mb-3">Choisir un plan</h5>
            <div class="row g-4" id="listePlans">
                <div class="text-center py-3">
                    <div class="spinner-border text-primary"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>
   // requiertAgent()

    function initNavbar() {
        const user = getUser()
        document.getElementById('navAuth').innerHTML = `
            <div class="d-flex align-items-center gap-2">
                <span class="small fw-semibold">👤 ${user?.prenom}</span>
                <button class="btn btn-outline-danger btn-sm" onclick="deconnexion()">
                    <i class="bi bi-box-arrow-right"></i>
                </button>
            </div>`
    }

    // ── Charger mon plan actuel ──────────────
    async function chargerMonPlan() {
        try {
            const data = await apiRequest('/agent/mon-plan', 'GET', null, true)
            const container = document.getElementById('monPlanActuel')

            if (!data.plan) {
                container.innerHTML = `
                    <div class="alert alert-warning">
                        <i class="bi bi-info-circle me-2"></i>
                        Vous n'avez pas encore de plan actif. Choisissez un plan ci-dessous.
                    </div>`
                return
            }

            const expire = data.est_expire
            const progression = Math.min(
                Math.round((data.annonces_utilisees / data.limite_annonces) * 100), 100
            )

            container.innerHTML = `
                <div class="rounded-4 p-4 text-white"
                    style="background:linear-gradient(135deg,#1d4ed8,#0ea5e9)">
                    <div class="row align-items-center g-3">
                        <div class="col-md-8">
                            <p class="text-white-50 small mb-1">Plan actuel</p>
                            <h3 class="fw-bold mb-1">${data.plan.nom_plan}</h3>
                            <p class="text-white-50 mb-0">
                                ${expire
                                    ? '<span class="badge bg-danger">⚠️ Expiré</span>'
                                    : `Expire le ${data.date_expiration} — <strong>${data.jours_restants} jour(s)</strong> restant(s)`}
                            </p>
                        </div>
                        <div class="col-md-4 text-md-end">
                            <p class="text-white-50 small mb-1">Annonces utilisées</p>
                            <h3 class="fw-bold mb-0">
                                ${data.annonces_utilisees} / ${data.limite_annonces}
                            </h3>
                        </div>
                    </div>

                    <!-- Barre de progression -->
                    <div class="mt-3">
                        <div class="progress bg-white bg-opacity-25" style="height:8px;border-radius:4px">
                            <div class="progress-bar bg-white"
                                style="width:${progression}%;border-radius:4px"></div>
                        </div>
                        <p class="text-white-50 small mt-1 mb-0">
                            ${data.quota_restant} annonce(s) restante(s)
                        </p>
                    </div>

                    ${expire ? `
                        <button class="btn btn-warning mt-3 fw-bold"
                            onclick="renouvelerPlan()">
                            <i class="bi bi-arrow-clockwise me-2"></i>Renouveler maintenant
                        </button>` : ''}
                </div>
            `
        } catch (e) {
            document.getElementById('monPlanActuel').innerHTML =
                `<div class="alert alert-danger">Erreur de chargement.</div>`
        }
    }

    // ── Charger tous les plans ───────────────
    async function chargerPlans() {
        try {
            const plans = await apiRequest('/plans')
            const monPlan = await apiRequest('/agent/mon-plan', 'GET', null, true)

            const icones  = ['bi-lightning', 'bi-star', 'bi-star-fill', 'bi-crown']
            const couleurs = ['border-secondary', 'border-primary', 'border-purple', 'border-warning']

            document.getElementById('listePlans').innerHTML = plans.map((p, i) => {
                const estActif  = monPlan.plan?.id === p.id
                const fonct     = p.fonctionnalites || {}

                return `
                    <div class="col-12 col-md-6">
                        <div class="plan-card p-4 h-100 ${estActif ? 'border-primary' : couleurs[i] || ''}
                            ${i === 2 ? 'popular' : ''} dashboard-card">
                            ${i === 2 ? '<span class="badge bg-primary position-absolute top-0 start-50 translate-middle">⭐ Populaire</span>' : ''}

                            <div class="d-flex justify-content-between align-items-start mb-3">
                                <div>
                                    <i class="bi ${icones[i] || 'bi-star'} text-primary fs-4 d-block mb-2"></i>
                                    <h5 class="fw-bold mb-0">${p.nom_plan}</h5>
                                </div>
                                ${estActif ? '<span class="badge bg-success">Actif</span>' : ''}
                                ${p.duree_essai_jours > 0 && !estActif
                                    ? '<span class="badge bg-warning text-dark">Essai gratuit</span>'
                                    : ''}
                            </div>

                            <div class="mb-4">
                                <span class="fs-2 fw-bold text-primary">
                                    ${p.prix_mensuel == 0 ? 'Gratuit' : formatPrix(p.prix_mensuel)}
                                </span>
                                ${p.prix_mensuel > 0 ? '<span class="text-muted">/mois</span>' : ''}
                            </div>

                            <ul class="list-unstyled mb-4">
                                <li class="mb-2">
                                    <i class="bi bi-check-circle-fill text-success me-2"></i>
                                    ${p.nb_annonces_max >= 999 ? 'Annonces illimitées' : p.nb_annonces_max + ' annonces max'}
                                </li>
                                ${fonct.badge_verifie ? `
                                    <li class="mb-2">
                                        <i class="bi bi-check-circle-fill text-success me-2"></i>
                                        Badge agent vérifié
                                    </li>` : ''}
                                ${fonct.mise_en_avant ? `
                                    <li class="mb-2">
                                        <i class="bi bi-check-circle-fill text-success me-2"></i>
                                        Annonces mises en avant
                                    </li>` : ''}
                                ${fonct.statistiques ? `
                                    <li class="mb-2">
                                        <i class="bi bi-check-circle-fill text-success me-2"></i>
                                        Statistiques détaillées
                                    </li>` : ''}
                                ${p.duree_essai_jours > 0 ? `
                                    <li class="mb-2">
                                        <i class="bi bi-check-circle-fill text-success me-2"></i>
                                        ${p.duree_essai_jours} jours d'essai gratuit
                                    </li>` : ''}
                            </ul>

                            <button
                                class="btn ${estActif ? 'btn-outline-secondary disabled' : 'btn-primary'} w-100 fw-semibold"
                                onclick="souscrire(${p.id}, ${p.prix_mensuel})"
                                ${estActif ? 'disabled' : ''}>
                                ${estActif ? '✓ Plan actuel' : 'Souscrire'}
                            </button>
                        </div>
                    </div>
                `
            }).join('')

        } catch (e) {
            document.getElementById('listePlans').innerHTML =
                `<div class="col-12"><div class="alert alert-danger">Erreur de chargement.</div></div>`
        }
    }

    // ── Souscrire à un plan ──────────────────
    async function souscrire(idPlan, prixMensuel) {
    if (prixMensuel == 0) {
        // Plan gratuit — souscription directe
        try {
            const data = await apiRequest(
                '/agent/souscrire', 'POST', {id_plan: idPlan}, true
            )
            showAlert(` ${data.message}`, 'success')
            setTimeout(() => location.reload(), 1500)
        } catch (e) {
            showAlert(e.data?.message || 'Erreur.', 'danger')
        }
    } else {
        // Plan payant — rediriger vers la page paiement
        window.location.href = `paiement.html?id_plan=${idPlan}`
    }
}


    // ── Renouveler le plan ───────────────────
    async function renouvelerPlan() {
        try {
            const data = await apiRequest('/agent/renouveler-plan', 'POST', null, true)
            showAlert(` ${data.message}`, 'success')
            setTimeout(() => location.reload(), 1500)
        } catch (e) {
            showAlert(e.data?.message || 'Erreur lors du renouvellement.', 'danger')
        }
    }

    initNavbar()
    chargerMonPlan()
    chargerPlans()
</script>
</body>
</html>
