<!DOCTYPE html>
<html lang="fr">
<head>
    <link rel="shortcut icon" href="favicon.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Annonces — SIMMo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">

<!-- PWA Simmo -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#4F46E5">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Simmo">
<link rel="apple-touch-icon" href="/images/icon-192.png">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-light bg-white sticky-top border-bottom">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">
            <i class="bi bi-buildings text-primary me-1"></i>SIMm<span class="text-primary">o</span>
        </a>
        <div id="navAuth"></div>
    </div>
</nav>

<div class="container py-5">
    <div class="row g-4">

        <!-- SIDEBAR -->
        <div class="col-12 col-lg-3">
            <div class="sidebar">
                <p class="small fw-bold text-muted text-uppercase px-2 mb-2">Espace Agent</p>
                <nav class="nav flex-column gap-1">
                    <a class="nav-link" href="dashboard.html"><i class="bi bi-grid me-2"></i>Dashboard</a>
                    <a class="nav-link active" href="mes-annonces.html"><i class="bi bi-house me-2"></i>Mes annonces</a>
                    <a class="nav-link" href="mes-contacts.html"><i class="bi bi-chat-dots me-2"></i>Mes contacts</a>
                    <a class="nav-link" href="plan.html"><i class="bi bi-credit-card me-2"></i>Mon plan</a>
                    <hr>
                    <button class="nav-link text-danger border-0 bg-transparent text-start w-100" onclick="deconnexion()">
                        <i class="bi bi-box-arrow-right me-2"></i>Déconnexion
                    </button>
                </nav>
            </div>
        </div>

        <!-- CONTENU -->
        <div class="col-12 col-lg-9">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h3 class="fw-bold mb-0">Mes annonces</h3>
                    <p class="text-muted small mb-0" id="nbAnnonces"></p>
                </div>
                <a href="creer-annonce.html" class="btn btn-primary">
                    <i class="bi bi-plus-lg me-2"></i>Nouvelle annonce
                </a>
            </div>

            <div id="alertContainer"></div>
            <div id="listeAnnonces">
                <div class="text-center py-5">
                    <div class="spinner-border text-primary"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal confirmation suppression -->
<div class="modal fade" id="modalSupprimer" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-body p-4 text-center">
                <div class="bg-danger bg-opacity-10 rounded-circle d-inline-flex p-3 mb-3">
                    <i class="bi bi-trash text-danger fs-3"></i>
                </div>
                <h5 class="fw-bold">Supprimer cette annonce ?</h5>
                <p class="text-muted small">Cette action est irréversible. Toutes les photos seront supprimées.</p>
                <div class="d-flex gap-2 justify-content-center mt-3">
                    <button class="btn btn-outline-secondary px-4" data-bs-dismiss="modal">Annuler</button>
                    <button class="btn btn-danger px-4" id="btnConfirmerSuppr">Supprimer</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>
   // requiertAgent()

    let idASupprimer   = null
    const modalSuppr   = new bootstrap.Modal(document.getElementById('modalSupprimer'))

    // ── Navbar ───────────────────────────────
    function initNavbar() {
        const user = getUser()
        document.getElementById('navAuth').innerHTML = `
            <div class="d-flex align-items-center gap-2">
                <span class="fw-semibold small">👤 ${user?.prenom}</span>
                <button class="btn btn-outline-danger btn-sm" onclick="deconnexion()">
                    <i class="bi bi-box-arrow-right"></i>
                </button>
            </div>`
    }

    // ── Charger annonces ─────────────────────
    async function chargerAnnonces(page = 1) {
        try {
            const data    = await apiRequest(`/agent/annonces?page=${page}`, 'GET', null, true);
            const annonces = data.data || []

            document.getElementById('nbAnnonces').textContent =
                `${data.total || 0} annonce(s)`

            if (annonces.length === 0) {
                document.getElementById('listeAnnonces').innerHTML = `
                    <div class="text-center py-5 dashboard-card p-5">
                        <i class="bi bi-house fs-1 text-muted opacity-25 d-block mb-3"></i>
                        <h5 class="text-muted">Aucune annonce publiée</h5>
                        <p class="text-muted small mb-4">Commencez par créer votre première annonce</p>
                        <a href="creer-annonce.html" class="btn btn-primary">
                            <i class="bi bi-plus-lg me-2"></i>Créer une annonce
                        </a>
                    </div>`
                return
            }

            document.getElementById('listeAnnonces').innerHTML = `
                <div class="d-flex flex-column gap-3">
                    ${annonces.map(a => `
                        <div class="dashboard-card p-3 d-flex align-items-center gap-3">
                            <!-- Photo -->
                            <img src="${imageUrl(a.photo_principale?.chemin_image)}"
                                class="rounded-3 flex-shrink-0"
                                style="width:80px;height:65px;object-fit:cover">

                            <!-- Infos -->
                            <div class="flex-grow-1 min-width-0">
                                <div class="d-flex align-items-center gap-2 mb-1">
                                    <h6 class="fw-bold mb-0 text-truncate">${a.titre}</h6>
                                    <span class="badge ${
                                        a.statut === 'active'   ? 'bg-success' :
                                        a.statut === 'inactive' ? 'bg-secondary' : 'bg-primary'
                                    } bg-opacity-10 ${
                                        a.statut === 'active'   ? 'text-success' :
                                        a.statut === 'inactive' ? 'text-secondary' : 'text-primary'
                                    }">${a.statut}</span>
                                </div>
                                <p class="text-muted small mb-1">
                                    <i class="bi bi-geo-alt text-primary me-1"></i>
                                    ${a.localisation?.ville || ''} — ${a.categorie?.libelle || ''}
                                </p>
                                <div class="d-flex align-items-center gap-3">
                                    <span class="text-primary fw-bold">${formatPrix(a.prix)}</span>
                                    <span class="text-muted small">
                                        <i class="bi bi-eye me-1"></i>${a.vues} vues
                                    </span>
                                </div>
                            </div>

                            <!-- Actions -->
                            <div class="d-flex flex-column gap-2 flex-shrink-0">
                                <a href="annonce-detail.html?id=${a.id}"
                                    class="btn btn-sm btn-outline-secondary"
                                    title="Voir">
                                    <i class="bi bi-eye"></i>
                                </a>
                                <a href="modifier-annonce.html?id=${a.id}"
                                    class="btn btn-sm btn-outline-warning"
                                    title="Modifier">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <button class="btn btn-sm btn-outline-danger"
                                    onclick="confirmerSuppression(${a.id})"
                                    title="Supprimer">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </div>
                        </div>
                    `).join('')}
                </div>

                <!-- Pagination -->
                ${data.last_page > 1 ? `
                    <nav class="mt-4">
                        <ul class="pagination justify-content-center">
                            ${Array.from({length: data.last_page}, (_, i) => i + 1).map(p => `
                                <li class="page-item ${p === data.current_page ? 'active' : ''}">
                                    <button class="page-link" onclick="chargerAnnonces(${p})">${p}</button>
                                </li>
                            `).join('')}
                        </ul>
                    </nav>` : ''}
            `

        } catch (e) {
            document.getElementById('listeAnnonces').innerHTML = `
                <div class="alert alert-danger">Erreur lors du chargement.</div>`
        }
    }

    // ── Confirmer suppression ────────────────
    function confirmerSuppression(id) {
        idASupprimer = id
        modalSuppr.show()
    }

    // ── Supprimer annonce ────────────────────
    document.getElementById('btnConfirmerSuppr').addEventListener('click', async function() {
        if (!idASupprimer) return
        this.disabled  = true
        this.innerHTML = '<span class="spinner-border spinner-border-sm"></span>'

        try {
            await apiRequest(`/agent/annonces/${idASupprimer}`, 'DELETE', null, true)
            modalSuppr.hide()
            showAlert(' Annonce supprimée avec succès.', 'success')
            chargerAnnonces()
        } catch (e) {
            showAlert('Erreur lors de la suppression.', 'danger')
        } finally {
            this.disabled  = false
            this.innerHTML = 'Supprimer'
            idASupprimer   = null
        }
    })

    initNavbar()
    chargerAnnonces()
</script>
</body>
</html>
