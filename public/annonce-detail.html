   // ── Charger annonces similaires via IA ───────
async function chargerSimilairesIA(annonce) {
    try {
        const criteresIA = buildCriteresIA({
            type_bien       : annonce.categorie?.libelle,
            type_transaction: annonce.type_transaction,
            ville           : annonce.localisation?.ville,
            budget_max      : annonce.prix * 1.5,
            limite          : 3,
        })

        const iaData = await appelIA('/recommander', criteresIA)

        if (iaData && iaData.recommandations?.length > 0) {
            // Filtrer pour exclure l'annonce courante
            return iaData.recommandations
                .filter(r => r.id_annonce != annonce.id)
                .slice(0, 3)
                .map(r => ({
                    id    : r.id_annonce,
                    titre : r.titre,
                    prix  : r.prix,
                    type_transaction: r.type_transaction,
                    score_ia: r.score_final,
                    raison  : r.raison,
                    localisation: {
                        ville   : r.ville,
                        quartier: r.quartier,
                    },
                    photo_principale: { chemin_image: r.photo },
                }))
        }
        return []
    } catch (e) {
        return []
    }
}

// ── Modifier chargerAnnonce() ─────────────────
async function chargerAnnonce() {

    const params = new URLSearchParams(window.location.search)
    const id     = params.get('id')

    // Vérification de l'ID
    if (!id || isNaN(parseInt(id))) {
        document.getElementById('pageContent').innerHTML = `
            <div class="text-center py-5">
                <h4 class="text-danger">ID d'annonce invalide</h4>
                <a href="annonces.html" class="btn btn-primary mt-3">
                    Retour aux annonces
                </a>
            </div>`
        return
    }

    try {
        // Afficher le spinner pendant le chargement
        document.getElementById('pageContent').innerHTML = `
            <div class="text-center py-5">
                <div class="spinner-border text-primary"></div>
                <p class="text-muted mt-2">Chargement...</p>
            </div>`

        const reponse = await fetch(
            CONFIG.API_URL + '/annonces/' + id,
            {
                headers: { 'Accept': 'application/json' }
            }
        )

        if (!reponse.ok) {
            if (reponse.status === 404) {
                afficherErreur('Cette annonce n\'existe pas.')
            } else {
                afficherErreur('Erreur serveur (' + reponse.status + ')')
            }
            return
        }

        const data     = await reponse.json()
        const annonce  = data.annonce || data
        const similaires = data.similaires || []

        if (!annonce || !annonce.id) {
            afficherErreur('Annonce introuvable.')
            return
        }

        afficherAnnonce(annonce, similaires)

    } catch (e) {
        console.error('Erreur detail annonce:', e)
        afficherErreur(
            'Erreur de connexion. ' +
            'Vérifiez que Laravel est démarré sur le port 8000.'
        )
    }
}

    if (!user) { window.location.href = "login.html"; return }

    try {
        const res = await apiRequest('/chat/demarrer', 'POST', {
            id_utilisateur: user.id,
            id_agent: agentId,
            id_annonce: annonceActuelle.id
        }, true)

        console.log("RES COMPLET:", res)      // ← regarde ce que contient res
        console.log("RES ID:", res.id)        // ← est-ce undefined ?
        console.log("RES KEYS:", Object.keys(res)) // ← quelles clés existent ?

                window.location.href = "chats.html?conversation=" + res.id

        if (!res.id) {
            alert("Erreur: pas d'ID retourné — " + JSON.stringify(res))
            return
        }


    } catch(e) {
        console.error("Erreur chat:", e)
    }
}

    // Vérifier si favori au chargement
async function verifierFavori(idAnnonce) {
    if (!estConnecte() || estAgent()) return

    try {
        var data = await apiRequest(
            '/utilisateur/favoris/' + idAnnonce + '/verifier',
            'GET', null, true
        )
        mettreAJourBtnFavori(data.est_favori)
    } catch (e) {
        console.error(e)
    }
}

// Toggle favori
async function toggleFavori(idAnnonce) {
    if (!verifierActionConnectee('ajouter aux favoris')) return

    try {
        var data = await apiRequest(
            '/utilisateur/favoris/' + idAnnonce + '/toggle',
            'POST', null, true
        )
        mettreAJourBtnFavori(data.est_favori)
        showAlert(data.message, 'success', 'alertContact')
    } catch (e) {
        console.error(e)
    }
}

// Mettre à jour le bouton favori
function mettreAJourBtnFavori(estFavori) {
    var btn = document.getElementById('btnFavori')
    if (!btn) return

    if (estFavori) {
        btn.innerHTML =
            '<i class="bi bi-heart-fill me-2 text-danger"></i>' +
            'Retire des favoris'
        btn.classList.remove('btn-outline-danger')
        btn.classList.add('btn-danger')
    } else {
        btn.innerHTML =
            '<i class="bi bi-heart me-2"></i>' +
            'Ajouter aux favoris'
        btn.classList.remove('btn-danger')
        btn.classList.add('btn-outline-danger')
    }
}

    //  Afficher dynamiquement le bon état du bouton
function mettreAJourBoutonContact() {
    const btn = document.getElementById('btnContact')
    if (!btn) return

    if (!estConnecte()) {
        btn.innerHTML  = '<i class="bi bi-lock me-2"></i>Connectez-vous pour contacter'
        btn.classList.replace('btn-primary', 'btn-secondary')
    } else {
        btn.innerHTML  = '<i class="bi bi-send me-2"></i>Contacter l\'agent'
        btn.classList.replace('btn-secondary', 'btn-primary')
    }
}

        navigator.clipboard.writeText(window.location.href)

        alert(
            'Erreur ouverture chat'
        )

    }
}

    // ── Envoyer un message à l'agent ──────────
    async function envoyerContact(e) {
        e.preventDefault()

        if (!verifierActionConnectee(
            'contacter un agent',
            window.location.href
        )) return

        const params = new URLSearchParams(window.location.search)
        const id     = params.get('id')
        const msg    = document.getElementById('messageContact').value.trim()

        if (!msg) {
            showAlert('Veuillez écrire un message.', 'warning', 'alertContact')
            return
        }

        showSpinner('btnContact', 'Envoi...')

        try {
            await apiRequest('/utilisateur/contacter', 'POST', {
                id_annonce : parseInt(id),
                message    : msg,
            }, true)

            showAlert(
                ' Message envoyé avec succès à l\'agent !',
                'success',
                'alertContact'
            )
            document.getElementById('messageContact').value = ''

        } catch (err) {
            const msg = err.data?.message || 'Erreur lors de l\'envoi.'
            showAlert(msg, 'danger', 'alertContact')
        } finally {
            hideSpinner('btnContact', '<i class="bi bi-send me-2"></i>Contacter l\'agent')
        }
    }

        // ── Afficher une erreur ───────────────────
    function afficherErreur(message) {
        document.getElementById('pageContent').innerHTML = `
            <div class="text-center py-5">
                <div class="bg-danger bg-opacity-10 rounded-circle
                    d-inline-flex p-4 mb-4">
                    <i class="bi bi-exclamation-circle text-danger fs-1"></i>
                </div>
                <h4 class="fw-bold text-danger">${message}</h4>
                <p class="text-muted mt-2 mb-4">
                    L'annonce que vous cherchez n'est pas disponible.
                </p>
                <a href="annonces.html" class="btn btn-primary px-5">
                    <i class="bi bi-arrow-left me-2"></i>
                    Retour aux annonces
                </a>
            </div>`
    }


    // ── Init ─────────────────────────────────
    initNavbar()
    chargerAnnonce()
</script>
