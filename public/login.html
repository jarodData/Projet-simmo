<!DOCTYPE html>
<html lang="fr">
<head>
    <link rel="shortcut icon" href="favicon.png" type="image/png"> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — SIMMo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body class="d-flex align-items-center min-vh-100" style="background:linear-gradient(135deg,#eff6ff,#f1f5f9)">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-5">

            <!-- Logo -->
            <div class="text-center mb-4">
                <a href="index.html" class="text-decoration-none">
                    <h2 class="fw-bold text-dark">
                        <i class="bi bi-buildings text-primary me-2"></i>
                        SIMm<span class="text-primary">o</span>
                    </h2>
                </a>
                <h4 class="fw-bold mt-3 mb-1">Connexion</h4>
                <p class="text-muted">Accédez à votre espace personnel</p>
            </div>

            <!-- Alertes -->
            <div id="alertContainer"></div>
<!-- Lien admin invisible -->
<p class="text-center mt-3">
    <a href="admin/login.html"
        style="font-size:10px;opacity:0;transition:opacity 0.3s;
               color:rgba(0,0,0,0.2);text-decoration:none"
        onmouseover="this.style.opacity='0.4'"
        onmouseout="this.style.opacity='0'">
        ·admin
    </a>
</p>
            <!-- Formulaire -->
            <div class="auth-card">
                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0">
                                <i class="bi bi-envelope text-muted"></i>
                            </span>
                            <input type="email" id="email" class="form-control border-start-0"
                                placeholder="votre@email.com" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Mot de passe</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0">
                                <i class="bi bi-lock text-muted"></i>
                            </span>
                            <input type="password" id="motDePasse" class="form-control border-start-0"
                                placeholder="••••••••" required>
                        </div>
                    </div>
                    <button type="submit" id="btnLogin" class="btn btn-primary w-100 py-2">
                        Se connecter
                    </button>
                </form>

                <hr class="my-4">

                <p class="text-center text-muted small mb-2">
                    Pas encore de compte ?
                    <a href="register.html" class="text-primary fw-semibold">S'inscrire</a>
                </p>
                <p class="text-center text-muted small">
                    Vous êtes agent ?
                    <a href="login-agent.html" class="text-success fw-semibold">Espace agent</a>
                </p>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>
    // Rediriger si déjà connecté
    localStorage.removeItem('redirect_after_login')
if (estConnecte() && !estAgent()) window.location.href = 'index.html'

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault()
    showSpinner('btnLogin', 'Connexion...')

    const res  = await fetch(CONFIG.API_URL + '/auth/utilisateur/login', {
        method : 'POST',
        headers: headersPublic(),
        body   : JSON.stringify({
            email       : document.getElementById('email').value,
            mot_de_passe: document.getElementById('motDePasse').value,
        })
    })
    const data = await res.json()
console.log('Réponse login:', data)
    if (!res.ok) {
        showAlert(data.message || 'Identifiants incorrects.', 'danger')
        hideSpinner('btnLogin', 'Se connecter')
        return
    }
    const user = data.utilisateur
    //Après — force la redirection vers index
sauvegarderSession(data.token, user)
localStorage.removeItem('redirect_after_login') // vide tout redirect
window.location.href = 'index.html'

//const data = await res.json()
console.log('DATA COMPLÈTE:', data)
console.log('user.role:', data.utilisateur?.role)
console.log('user.type:', data.utilisateur?.type)// redirige directement
})

document.addEventListener('DOMContentLoaded', function () {
    const params   = new URLSearchParams(location.search)
    const verified = params.get('verified')
    const token    = params.get('token')
    const userJson = params.get('user')

    if (verified === 'success' && token && userJson) {
        try {
            const user = JSON.parse(userJson)

            // Stocker exactement comme un login normal
            localStorage.setItem('token', token)
            localStorage.setItem('user',  JSON.stringify(user))

            // Nettoyer l'URL
            history.replaceState({}, '', 'login.html')

            // Message de bienvenue
            afficherAlerte('success',
                'Compte vérifié ! Bienvenue, ' + user.prenom + ' !')
                    window.location.href = 'index.html'

        } catch (e) {
            console.error('Erreur auto-login:', e)
        }

    } else if (verified === 'error') {
        history.replaceState({}, '', 'login.html')
        afficherAlerte('danger',
            '❌ Lien de vérification invalide ou expiré. Reconnectez-vous pour en recevoir un nouveau.')
    }
})

function afficherAlerte(type, message) {
    // Cherche une zone d'alerte existante ou en crée une
    let zone = document.getElementById('alerteVerification')
    if (!zone) {
        zone = document.createElement('div')
        zone.id = 'alerteVerification'
        // Insérer en haut du formulaire
        const form = document.querySelector('form') || document.querySelector('.auth-card')
        if (form) form.prepend(zone)
        else document.body.prepend(zone)
    }
    zone.innerHTML = `
        <div class="alert alert-${type} d-flex align-items-center gap-2 mb-3">
            ${message}
        </div>`
}
</script>
</body>
</html>
