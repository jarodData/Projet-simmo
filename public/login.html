<!DOCTYPE html>
<html lang="fr">
<head>
    <link rel="shortcut icon" href="favicon.png" type="image/png"> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — SIMMo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="d-flex align-items-center min-vh-100" style="background:linear-gradient(135deg,#eff6ff,#f1f5f9)">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-5">

            <!-- Logo -->
            <div class="text-center mb-4">
                <a href="index.html" class="text-decoration-none">
                    <h2 class="fw-bold text-dark">
                        <i class="bi bi-buildings text-primary me-2"></i>
                        SIMm<span class="text-primary">o</span>
                    </h2>
                </a>
                <h4 class="fw-bold mt-3 mb-1">Connexion</h4>
                <p class="text-muted">Accédez à votre espace personnel</p>
            </div>

            <!-- Alertes -->
            <div id="alertContainer"></div>

            <!-- Formulaire -->
            <div class="auth-card">
                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0">
                                <i class="bi bi-envelope text-muted"></i>
                            </span>
                            <input type="email" id="email" class="form-control border-start-0"
                                placeholder="votre@email.com" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Mot de passe</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0">
                                <i class="bi bi-lock text-muted"></i>
                            </span>
                            <input type="password" id="motDePasse" class="form-control border-start-0"
                                placeholder="••••••••" required>
                        </div>
                    </div>
                    <button type="submit" id="btnLogin" class="btn btn-primary w-100 py-2">
                        Se connecter
                    </button>
                </form>

                <hr class="my-4">

                <p class="text-center text-muted small mb-2">
                    Pas encore de compte ?
                    <a href="register.html" class="text-primary fw-semibold">S'inscrire</a>
                </p>
                <p class="text-center text-muted small">
                    Vous êtes agent ?
                    <a href="login-agent.html" class="text-success fw-semibold">Espace agent</a>
                </p>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>
    // Rediriger si déjà connecté
    if (estConnecte()) window.location.href = 'index.html'

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault()
        showSpinner('btnLogin', 'Connexion...')

        try {
            const data = await apiRequest('/auth/utilisateur/login', 'POST', {
                email        : document.getElementById('email').value,
                mot_de_passe : document.getElementById('motDePasse').value,
            })

            // Sauvegarder token et user
            localStorage.setItem('simmo_token', data.token)
            localStorage.setItem('simmo_user',  JSON.stringify(data.utilisateur))
            localStorage.setItem('simmo_role',  'utilisateur')

            showAlert('Connexion réussie ! Redirection...', 'success')
            setTimeout(() => window.location.href = 'index.html', 1000)

        } catch (err) {
            const msg = err.data?.message || err.data?.errors?.email?.[0] || 'Erreur de connexion.'
            showAlert(msg, 'danger')
            hideSpinner('btnLogin', 'Se connecter')
        }
    })
</script>
</body>
</html>
