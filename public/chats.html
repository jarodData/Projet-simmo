<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat — SIMMo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <style>
        body { background:#f8fafc; }
        .chat-wrapper {
            max-width : 700px;
            margin    : 0 auto;
            padding   : 16px;
        }
        .chat-header {
            background    : white;
            border-radius : 16px;
            padding       : 16px 20px;
            margin-bottom : 12px;
            border        : 1px solid #e2e8f0;
            display       : flex;
            align-items   : center;
            gap           : 12px;
        }
        .chat-box {
            height         : calc(100vh - 280px);
            min-height     : 300px;
            overflow-y     : auto;
            padding        : 16px;
            display        : flex;
            flex-direction : column;
            gap            : 10px;
            background     : #f1f5f9;
            border-radius  : 16px;
            border         : 1px solid #e2e8f0;
            margin-bottom  : 12px;
        }
        .bubble {
            max-width    : 72%;
            padding      : 10px 14px;
            border-radius: 16px;
            font-size    : 0.9rem;
            line-height  : 1.5;
            word-break   : break-word;
        }
        .bubble.moi {
            background    : #2563eb;
            color         : white;
            align-self    : flex-end;
            border-radius : 16px 16px 4px 16px;
        }
        .bubble.autre {
            background    : white;
            color         : #1e293b;
            align-self    : flex-start;
            border-radius : 16px 16px 16px 4px;
            border        : 1px solid #e2e8f0;
        }
        .bubble .heure {
            font-size  : 0.68rem;
            opacity    : 0.65;
            margin-top : 5px;
            display    : block;
            text-align : right;
        }
        .bubble.autre .heure { text-align: left; }
        .input-zone {
            background    : white;
            border-radius : 16px;
            border        : 1px solid #e2e8f0;
            padding       : 10px 12px;
            display       : flex;
            align-items   : flex-end;
            gap           : 8px;
        }
        .input-zone textarea {
            flex       : 1;
            border     : none;
            outline    : none;
            resize     : none;
            font-size  : 0.9rem;
            min-height : 40px;
            max-height : 120px;
            background : transparent;
            line-height: 1.5;
            padding    : 4px 0;
        }
        .btn-envoyer {
            background     : #2563eb;
            border         : none;
            border-radius  : 50%;
            width          : 40px;
            height         : 40px;
            display        : flex;
            align-items    : center;
            justify-content: center;
            flex-shrink    : 0;
            color          : white;
            transition     : background .2s;
            cursor         : pointer;
        }
        .btn-envoyer:hover    { background: #1d4ed8; }
        .btn-envoyer:disabled { background: #94a3b8; cursor: not-allowed; }
        .separateur-date {
            text-align : center;
            font-size  : 0.75rem;
            color      : #94a3b8;
            margin     : 8px 0;
            position   : relative;
        }
        .separateur-date::before,
        .separateur-date::after {
            content   : '';
            position  : absolute;
            top       : 50%;
            width     : 35%;
            height    : 1px;
            background: #e2e8f0;
        }
        .separateur-date::before { left: 0; }
        .separateur-date::after  { right: 0; }
        @media (max-width: 576px) {
            .bubble { max-width: 88%; }
        }
    </style>
</head>
<body>

<div class="chat-wrapper py-3">

    <!-- En-tête -->
    <div class="chat-header">
        <a href="javascript:history.back()"
           class="btn btn-light btn-sm flex-shrink-0">
            <i class="bi bi-arrow-left"></i>
        </a>
        <div class="bg-primary text-white rounded-circle flex-shrink-0
            d-flex align-items-center justify-content-center fw-bold"
            style="width:40px;height:40px;font-size:15px" id="avatarInter">?</div>
        <div class="flex-grow-1" style="min-width:0">
            <p class="fw-bold mb-0 text-truncate" id="nomInter">Chargement...</p>
            <p class="text-muted small mb-0 text-truncate" id="titreAnnonce"></p>
        </div>
        <span class="badge bg-success flex-shrink-0" id="statutLigne">
            <i class="bi bi-circle-fill me-1" style="font-size:7px"></i>En ligne
        </span>
    </div>

    <!-- Messages -->
    <div class="chat-box" id="chatBox">
        <div class="text-center text-muted py-5" id="chargementMsg">
            <div class="spinner-border text-primary spinner-border-sm"></div>
            <p class="small mt-2 mb-0">Chargement des messages...</p>
        </div>
    </div>

    <!-- Saisie -->
    <div class="input-zone">
        <textarea
            id="inputMessage"
            placeholder="Écrivez votre message..."
            rows="1"
            onkeydown="envoyerSiEntree(event)"
            oninput="ajusterHauteur(this)"
        ></textarea>
        <button class="btn-envoyer" id="btnEnvoyer" onclick="envoyerMessage()">
            <i class="bi bi-send-fill" style="font-size:15px"></i>
        </button>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>

// ════════════════════════════════════════════════════════════
// INIT — récupérer token et user via les fonctions de config.js
// ════════════════════════════════════════════════════════════

// DOIT ÊTRE LA PREMIÈRE CHOSE dans le script
const token = getToken()
const user  = getUser()

// Redirige vers le bon login selon le rôle
if (!token || !user) {
    localStorage.removeItem('redirect_after_login')
    window.location.href = estAgent() ? 'login-agent.html' : 'login.html'
    throw new Error('Non connecté')
}

const userId         = user.id 
const params         = new URLSearchParams(location.search)
const conversationId = params.get('conversation_id')

//  Après — affiche la liste si pas de conversation_id


let dernierIdVu  = 0
let intervalId   = null
let dateAffichee = ''

if (!conversationId) {
    //Affiche la liste
    afficherListeConversations()
} else {
    // Affiche le chat
    chargerInfosConversation()
    chargerMessages()
    intervalId = setInterval(chargerMessages, 5000)
    document.getElementById('inputMessage').focus()
}

// Stopper le polling quand on quitte
window.addEventListener('beforeunload', () => clearInterval(intervalId))

async function afficherListeConversations() {
    // Cacher l'interface chat
    document.querySelector('.chat-box').style.display = 'none'
    document.querySelector('.input-zone').style.display = 'none'
    document.getElementById('nomInter').textContent = 'Mes conversations'
    document.getElementById('avatarInter').innerHTML = '<i class="bi bi-chat-dots"></i>'
    document.getElementById('statutLigne').style.display = 'none'

    const chatBox = document.getElementById('chatBox')
    chatBox.style.display = 'block'
    chatBox.style.height = 'auto'
    chatBox.innerHTML = `
        <div class="text-center py-3">
            <div class="spinner-border text-primary spinner-border-sm"></div>
        </div>`

    const conversations = await apiRequest('/conversations', 'GET', null, true)

    if (!conversations || conversations.length === 0) {
        chatBox.innerHTML = `
            <div class="text-center py-5 text-muted">
                <i class="bi bi-chat-dots fs-2 d-block mb-2 opacity-25"></i>
                <p>Aucune conversation</p>
            </div>`
        return
    }

    chatBox.innerHTML = conversations.map(c => {
        const inter  = c.interlocuteur || {}
        const prenom = inter.prenom || 'Utilisateur'
        const nom    = inter.nom || ''
        const nonLus = c.non_lus || 0
        const date   = c.dernier_message_at
            ? new Date(c.dernier_message_at).toLocaleDateString('fr-FR', {
                day: '2-digit', month: 'short'
              })
            : ''

        return `
            <a href="chats.html?conversation_id=${c.id}"
               class="text-decoration-none text-dark">
                <div class="d-flex align-items-center gap-3 p-3 rounded-3 mb-2"
                    style="background:${nonLus > 0 ? 'rgba(37,99,235,0.08)' : 'white'};
                           border:1px solid #e2e8f0">
                    <div class="bg-primary text-white rounded-circle flex-shrink-0
                        d-flex align-items-center justify-content-center fw-bold"
                        style="width:44px;height:44px;font-size:16px">
                        ${prenom[0]?.toUpperCase() || 'U'}
                    </div>
                    <div class="flex-grow-1" style="min-width:0">
                        <div class="d-flex justify-content-between">
                            <p class="fw-semibold small mb-0">
                                ${prenom} ${nom}
                                ${nonLus > 0
                                    ? `<span class="badge bg-danger ms-1">${nonLus}</span>`
                                    : ''}
                            </p>
                            <small class="text-muted">${date}</small>
                        </div>
                        <p class="text-muted small text-truncate mb-0">
                            ${c.dernier_message || 'Nouvelle conversation'}
                        </p>
                        ${c.annonce
                            ? `<p class="text-muted mb-0" style="font-size:11px">
                                <i class="bi bi-house me-1"></i>${c.annonce.titre || ''}
                               </p>`
                            : ''}
                    </div>
                    <i class="bi bi-chevron-right text-muted"></i>
                </div>
            </a>`
    }).join('')
}

// ════════════════════════════════════════════════════════════
// EN-TÊTE CONVERSATION
// ════════════════════════════════════════════════════════════

async function chargerInfosConversation() {
    try {
        const conversations = await apiRequest('/conversations', 'GET', null, true)
        if (!conversations || !Array.isArray(conversations)) return

        const conv = conversations.find(c => c.id == conversationId)
        if (!conv) return

        const inter  = conv.interlocuteur || {}
        const prenom = inter.prenom || inter.name || 'Utilisateur'
        const nom    = inter.nom    || ''

        document.getElementById('nomInter').textContent     = (prenom + ' ' + nom).trim()
        document.getElementById('titreAnnonce').textContent = conv.annonce?.titre || ''
        document.getElementById('avatarInter').textContent  = prenom[0]?.toUpperCase() || 'U'

    } catch (e) {
        console.error('Erreur infos conversation:', e)
    }
}


// ════════════════════════════════════════════════════════════
// CHARGER MESSAGES
// ════════════════════════════════════════════════════════════

async function chargerMessages() {
    try {
        const res = await fetch(
            CONFIG.API_URL + '/conversations/' + conversationId + '/messages',
            {
                headers: {
                    'Authorization': 'Bearer ' + token,
                    'Accept'       : 'application/json',
                }
            }
        )

        
if (res.status === 401) {
    clearInterval(intervalId)
    localStorage.removeItem('redirect_after_login')
    window.location.href = estAgent() ? 'login-agent.html' : 'login.html'
    return
}

        if (!res.ok) return

        const messages = await res.json()
        const box      = document.getElementById('chatBox')

        // Supprimer le spinner au premier chargement
        const spinner = document.getElementById('chargementMsg')
        if (spinner) spinner.remove()

        // N'ajouter que les nouveaux messages
        const nouveaux = messages.filter(m => m.id > dernierIdVu)
        if (nouveaux.length === 0) return

        // Mémoriser si on était en bas
        const enBas = box.scrollHeight - box.scrollTop <= box.clientHeight + 80

        // Vider seulement au tout premier chargement
        if (dernierIdVu === 0) box.innerHTML = ''

        nouveaux.forEach(m => {
            // Séparateur de date si nouveau jour
             console.log('created_at:', m.created_at)

            const jour = new Date(m.created_at).toLocaleDateString('fr-FR', {
                weekday: 'long', day: 'numeric', month: 'long',timeZone: 'Africa/Douala'
                
            })
            if (jour !== dateAffichee) {
                dateAffichee    = jour
                const sep       = document.createElement('div')
                sep.className   = 'separateur-date'
                sep.textContent = jour
                box.appendChild(sep)
            }

            // Bulle message
            const estMoi      = m.expediteur_id === userId
            const div         = document.createElement('div')
            div.className     = 'bubble ' + (estMoi ? 'moi' : 'autre')
            div.innerHTML     =
                escapeHtml(m.contenu) +
                '<span class="heure">' + formaterHeure(m.created_at) + '</span>'
            box.appendChild(div)

            dernierIdVu = Math.max(dernierIdVu, m.id)
        })

        // Scroller vers le bas
        if (enBas) box.scrollTop = box.scrollHeight

    } catch (e) {
        console.error('Erreur chargement messages:', e)
    }
}


// ════════════════════════════════════════════════════════════
// ENVOYER MESSAGE
// ════════════════════════════════════════════════════════════

async function envoyerMessage() {
    const input   = document.getElementById('inputMessage')
    const btn     = document.getElementById('btnEnvoyer')
    const contenu = input.value.trim()
    if (!contenu) return

    // Vider l'input immédiatement
    input.value        = ''
    input.style.height = 'auto'
    btn.disabled       = true

    try {
        const res = await fetch(
            CONFIG.API_URL + '/conversations/' + conversationId + '/messages',
            {
                method : 'POST',
                headers: {
                    'Content-Type' : 'application/json',
                    'Authorization': 'Bearer ' + token,
                    'Accept'       : 'application/json',
                },
                body: JSON.stringify({ contenu }),
            }
        )
if (res.status === 401) {
    localStorage.removeItem('redirect_after_login')
    window.location.href = estAgent() ? 'login-agent.html' : 'login.html'
    return
}

        if (res.ok) {
            await chargerMessages()
        }

    } catch (e) {
        console.error('Erreur envoi:', e)
        input.value = contenu   // remettre le texte si erreur réseau
    } finally {
        btn.disabled = false
        input.focus()
    }
}


// ════════════════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════════════════

function envoyerSiEntree(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault()
        envoyerMessage()
    }
}

function ajusterHauteur(el) {
    el.style.height = 'auto'
    el.style.height = Math.min(el.scrollHeight, 120) + 'px'
}

function formaterHeure(dateStr) {
    if (!dateStr) return ''
    return new Date(dateStr).toLocaleTimeString('fr-FR', {
        hour    : '2-digit',
        minute  : '2-digit',
        timeZone: 'Africa/Douala' // ✅ UTC+1 Cameroun
    })
}

function escapeHtml(str) {
    return String(str)
        .replace(/&/g,  '&amp;')
        .replace(/</g,  '&lt;')
        .replace(/>/g,  '&gt;')
        .replace(/\n/g, '<br>')
}


// ════════════════════════════════════════════════════════════
// DÉMARRAGE
// ════════════════════════════════════════════════════════════

</script>
</body>
</html>
