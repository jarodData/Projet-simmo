<!DOCTYPE html>
<html lang="fr">
<head>
    <link rel="shortcut icon" href="favicon.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — SIMMo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-light bg-white sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold fs-4" href="index.html">
            <i class="bi bi-buildings text-primary me-1"></i>SIMm<span class="text-primary">o</span>
        </a>
        <div class="d-flex align-items-center gap-2" id="navAuth"></div>
    </div>
</nav>

<div class="container py-5">
    <div class="row g-4">

        <!-- ── SIDEBAR ───────────────────────── -->
        <div class="col-12 col-lg-3">
            <div class="sidebar">
                <p class="small fw-bold text-muted text-uppercase px-2 mb-2">
                    <i class="bi bi-buildings me-1"></i>Espace Agent
                </p>
                <nav class="nav flex-column gap-1">
                    <a class="nav-link active" href="dashboard.html">
                        <i class="bi bi-grid me-2"></i>Dashboard
                    </a>
                    <a class="nav-link" href="mes-annonces.html">
                        <i class="bi bi-house me-2"></i>Mes annonces
                    </a>
                    <a class="nav-link d-flex align-items-center" href="chats.html">
                        <i class="bi bi-chat-dots me-2"></i>Mes messages
                        <span class="badge bg-danger ms-auto" id="badgeContacts" style="display:none"></span>
                    </a>
                    <a class="nav-link" href="plan.html">
                        <i class="bi bi-credit-card me-2"></i>Mon plan
                    </a>
                    <hr>
                    <a class="nav-link" href="index.html">
                        <i class="bi bi-house-door me-2"></i>Accueil site
                    </a>
                    <button class="nav-link text-danger border-0 bg-transparent text-start w-100"
                        onclick="deconnexion()">
                        <i class="bi bi-box-arrow-right me-2"></i>Déconnexion
                    </button>
                </nav>
            </div>
        </div>

        <!-- ── CONTENU ───────────────────────── -->
        <div class="col-12 col-lg-9">

            <!-- En-tête -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h3 class="fw-bold mb-0" id="titreBonjour">Bonjour 👋</h3>
                    <p class="text-muted mb-0">Voici votre activité ce mois</p>
                </div>
                <a href="creer-annonce.html" class="btn btn-primary">
                    <i class="bi bi-plus-lg me-2"></i>Nouvelle annonce
                </a>
            </div>

            <!-- Alerte plan -->
            <div id="alertePlan"></div>

            <!-- Statistiques -->
            <div class="row g-3 mb-4">
                <div class="col-6 col-md-3">
                    <div class="dashboard-card p-4 text-center">
                        <div class="bg-primary bg-opacity-10 rounded-3 p-2 d-inline-flex mb-2">
                            <i class="bi bi-house text-primary fs-4"></i>
                        </div>
                        <h3 class="fw-bold mb-0" id="statAnnonces">—</h3>
                        <p class="text-muted small mb-0">Annonces actives</p>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="dashboard-card p-4 text-center">
                        <div class="bg-success bg-opacity-10 rounded-3 p-2 d-inline-flex mb-2">
                            <i class="bi bi-people text-success fs-4"></i>
                        </div>
                        <h3 class="fw-bold mb-0" id="statContacts">—</h3>
                        <p class="text-muted small mb-0">Contacts reçus</p>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="dashboard-card p-4 text-center">
                        <div class="rounded-3 p-2 d-inline-flex mb-2"
                            style="background:rgba(124,58,237,0.1)">
                            <i class="bi bi-eye fs-4" style="color:#7c3aed"></i>
                        </div>
                        <h3 class="fw-bold mb-0" id="statVues">—</h3>
                        <p class="text-muted small mb-0">Vues ce mois</p>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="dashboard-card p-4 text-center">
                        <div class="bg-warning bg-opacity-10 rounded-3 p-2 d-inline-flex mb-2">
                            <i class="bi bi-graph-up text-warning fs-4"></i>
                        </div>
                        <h3 class="fw-bold mb-0" id="statServices">—</h3>
                        <p class="text-muted small mb-0">Services rendus</p>
                    </div>
                </div>
            </div>

            <!-- Plan actif -->
            <div id="planActif" class="mb-4"></div>

            <div class="row g-4">

                <!-- Dernières annonces -->
                <div class="col-12 col-md-6">
                    <div class="dashboard-card p-4 h-100">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h5 class="fw-bold mb-0">Annonces récentes</h5>
                            <a href="mes-annonces.html" class="text-primary small">Voir tout</a>
                        </div>
                        <div id="dernieresAnnonces">
                            <div class="text-center py-3">
                                <div class="spinner-border spinner-border-sm text-primary"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Derniers contacts -->
                <div class="col-12 col-md-6">
                    <div class="dashboard-card p-4 h-100">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h5 class="fw-bold mb-0">
                                Derniers messages
                                <span class="badge bg-danger ms-1" id="badgeNonLus" style="display:none"></span>
                            </h5>
                            <a href="chats.html" class="text-primary small">Voir tout</a>
                        </div>
                        <div id="derniersContacts">
                            <div class="text-center py-3">
                                <div class="spinner-border spinner-border-sm text-primary"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>

    // ── Navbar ───────────────────────────────
    function initNavbar() {
        const user = getUser()
        if (!user) {
            window.location.href = "login.html"
            return
        }
        document.getElementById('navAuth').innerHTML = `
            <div class="d-flex align-items-center gap-2 bg-light px-3 py-2 rounded-3">
                <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center fw-bold"
                    style="width:32px;height:32px;font-size:13px">
                    ${user?.prenom?.[0]?.toUpperCase() || 'A'}
                </div>
                <span class="fw-semibold small">${user?.prenom || ''}</span>
            </div>
            <button class="btn btn-outline-danger btn-sm" onclick="deconnexion()">
                <i class="bi bi-box-arrow-right"></i>
            </button>
        `
        document.getElementById('titreBonjour').textContent = `Bonjour, ${user?.prenom} 👋`
    }

    // ── Charger le dashboard ─────────────────
    async function chargerDashboard() {
        const user = getUser()
        if (!user) return

        try {
            // Dashboard principal
            const data = await apiRequest('/agent/dashboard', 'GET', null, true)

            // ✅ Conversations avec non_lus (corrigé côté controller aussi)
            const conversations = await apiRequest(
                '/chat/conversations/agent/' + user.id,
                'GET', null, true
            )

            console.log("conversations agent:", conversations) // debug

            // ── Stats ─────────────────────────
            document.getElementById('statAnnonces').textContent = data.annonces_actives || 0
            document.getElementById('statContacts').textContent = conversations.length || 0
            document.getElementById('statVues').textContent = data.statistiques_mois?.nb_vues_total || 0
            document.getElementById('statServices').textContent = data.statistiques_mois?.nb_services_rendus || 0

            // ── Nombre messages non lus ───────
            const nbNonLus = conversations.reduce((total, c) => total + (c.non_lus || 0), 0)

            if (nbNonLus > 0) {
                ['badgeContacts', 'badgeNonLus'].forEach(id => {
                    const el = document.getElementById(id)
                    if (el) { el.style.display = 'inline'; el.textContent = nbNonLus }
                })
            }

            // ── Plan ──────────────────────────
            afficherPlan(data.agent)

            // ── Annonces ──────────────────────
            afficherDernieresAnnonces(data.dernieres_annonces)

            // ✅ Conversations corrigées
            afficherDerniersContacts(conversations)

        } catch (e) {
            console.error("Erreur dashboard:", e)
        }
    }

    // ── Afficher le plan ─────────────────────
    function afficherPlan(agent) {
        if (!agent?.plan) return

        const expire = agent.date_expiration_plan
            ? new Date(agent.date_expiration_plan) < new Date()
            : true

        const jours = agent.date_expiration_plan && !expire
            ? Math.ceil((new Date(agent.date_expiration_plan) - new Date()) / (1000*60*60*24))
            : 0

        if (expire) {
            document.getElementById('alertePlan').innerHTML = `
                <div class="alert alert-warning d-flex align-items-center gap-2 mb-4">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                    <div>
                        Votre plan a expiré.
                        <a href="plan.html" class="fw-bold">Renouvelez votre abonnement</a> pour continuer à publier.
                    </div>
                </div>`
        }

        document.getElementById('planActif').innerHTML = `
            <div class="rounded-3 p-4 text-white"
                style="background:linear-gradient(135deg,#1d4ed8,#0ea5e9)">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <p class="text-white-50 small mb-1">Plan actif</p>
                        <h4 class="fw-bold mb-1">${agent.plan.nom_plan}</h4>
                        <p class="text-white-50 small mb-0">
                            ${expire ? '⚠️ Expiré' : `Expire dans ${jours} jour(s)`}
                        </p>
                    </div>
                    <a href="plan.html" class="btn btn-light btn-sm fw-semibold">
                        Gérer <i class="bi bi-arrow-right ms-1"></i>
                    </a>
                </div>
            </div>`
    }

    // ── Afficher dernières annonces ──────────
    function afficherDernieresAnnonces(annonces) {
        const container = document.getElementById('dernieresAnnonces')
        if (!annonces || annonces.length === 0) {
            container.innerHTML = `
                <div class="text-center py-4 text-muted">
                    <i class="bi bi-house fs-2 d-block mb-2 opacity-25"></i>
                    <p class="small">Aucune annonce publiée</p>
                    <a href="creer-annonce.html" class="btn btn-sm btn-primary">Créer une annonce</a>
                </div>`
            return
        }

        container.innerHTML = annonces.map(a => `
            <div class="d-flex align-items-center gap-3 p-2 rounded-3 mb-2"
                style="transition:background 0.2s"
                onmouseover="this.style.background='#f8fafc'"
                onmouseout="this.style.background='transparent'">
                <img src="${imageUrl(a.photo_principale?.chemin_image)}"
                    class="rounded-3" style="width:48px;height:42px;object-fit:cover"
                    onerror="this.src='https://placehold.co/48x42?text=?'">
                <div class="flex-grow-1" style="min-width:0">
                    <p class="fw-semibold small mb-0 text-truncate">${a.titre}</p>
                    <p class="text-muted mb-0" style="font-size:11px">
                        ${a.localisation?.ville || ''} •
                        <span class="badge ${a.statut === 'active' ? 'bg-success' : 'bg-secondary'}
                            bg-opacity-10 ${a.statut === 'active' ? 'text-success' : 'text-secondary'}">
                            ${a.statut}
                        </span>
                    </p>
                </div>
                <span class="text-primary fw-bold small">${formatPrix(a.prix)}</span>
            </div>
        `).join('')
    }

    // ✅ CORRIGÉ — HTML template réparé, non_lus et date corrects
    function afficherDerniersContacts(conversations) {
        const container = document.getElementById('derniersContacts')

        if (!conversations || conversations.length === 0) {
            container.innerHTML = `
                <div class="text-center py-4 text-muted">
                    <i class="bi bi-chat-dots fs-2 d-block mb-2 opacity-25"></i>
                    <p class="small">Aucune conversation</p>
                </div>`
            return
        }

        container.innerHTML = conversations.map(c => `
            <a href="chats.html?conversation=${c.id ?? c.id_conversation}" class="text-decoration-none text-dark">
                <div class="d-flex align-items-start gap-3 p-3 rounded-3 mb-2
                    ${(c.non_lus || 0) > 0 ? 'bg-primary bg-opacity-10' : 'bg-light'}"
                    style="transition:background 0.2s">

                    <!-- Avatar -->
                    <div class="bg-primary text-white rounded-circle
                        d-flex align-items-center justify-content-center
                        fw-bold flex-shrink-0"
                        style="width:40px;height:40px;font-size:14px">
                        ${c.utilisateur?.prenom?.[0]?.toUpperCase() || 'U'}
                    </div>

                    <!-- Contenu -->
                    <div class="flex-grow-1" style="min-width:0">
                        <div class="d-flex justify-content-between align-items-center">
                            <p class="fw-semibold small mb-0 text-truncate">
                                ${c.utilisateur?.prenom || ''} ${c.utilisateur?.nom || ''}
                                ${(c.non_lus || 0) > 0
                                    ? `<span class="badge bg-danger ms-1" style="font-size:9px">${c.non_lus}</span>`
                                    : ''}
                            </p>
                            <small class="text-muted flex-shrink-0 ms-2">
                                ${c.dernier_message_at
                                    ? new Date(c.dernier_message_at).toLocaleDateString('fr-FR', { day: '2-digit', month: 'short' })
                                    : ''}
                            </small>
                        </div>
                        <p class="text-muted text-truncate mb-0" style="font-size:12px">
                            ${c.dernier_message || '<em>Aucun message</em>'}
                        </p>
                    </div>
                </div>
            </a>
        `).join('')
    }

    // ── Init ─────────────────────────────────
    initNavbar()
    chargerDashboard()
</script>
</body>
</html>
