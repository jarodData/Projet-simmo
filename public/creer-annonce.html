<!DOCTYPE html>
<html lang="fr">
<head>
    <link rel="shortcut icon" href="favicon.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer une annonce — SIMMo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <!-- ✅ Colle ce bloc dans le <head> de TOUTES tes pages HTML -->

<!-- PWA Simmo -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#4F46E5">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Simmo">
<link rel="apple-touch-icon" href="/images/icon-192.png">

<script>
    // Enregistrement du Service Worker
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/service-worker.js')
                .then(reg => console.log('✅ Simmo SW enregistré:', reg.scope))
                .catch(err => console.error('❌ SW erreur:', err));
        });
    }

    // Bouton d'installation PWA (optionnel)
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;

        // Si tu as un bouton "Installer l'app" dans ton HTML
        const installBtn = document.getElementById('install-btn');
        if (installBtn) {
            installBtn.style.display = 'block';
            installBtn.addEventListener('click', () => {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(choice => {
                    if (choice.outcome === 'accepted') {
                        console.log('✅ App installée');
                    }
                    deferredPrompt = null;
                });
            });
        }
    });
</script>

</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-light bg-white sticky-top border-bottom">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">
            <i class="bi bi-buildings text-primary me-1"></i>SIMm<span class="text-primary">o</span>
        </a>
        <div id="navAuth"></div>
    </div>
</nav>

<div class="container py-5">
    <div class="row g-4">

        <!-- SIDEBAR -->
        <div class="col-12 col-lg-3">
            <div class="sidebar">
                <p class="small fw-bold text-muted text-uppercase px-2 mb-2">Espace Agent</p>
                <nav class="nav flex-column gap-1">
                    <a class="nav-link" href="dashboard.html"><i class="bi bi-grid me-2"></i>Dashboard</a>
                    <a class="nav-link active" href="mes-annonces.html"><i class="bi bi-house me-2"></i>Mes annonces</a>
                    <a class="nav-link" href="mes-contacts.html"><i class="bi bi-chat-dots me-2"></i>Mes contacts</a>
                    <a class="nav-link" href="plan.html"><i class="bi bi-credit-card me-2"></i>Mon plan</a>
                    <hr>
                    <button class="nav-link text-danger border-0 bg-transparent text-start w-100" onclick="deconnexion()">
                        <i class="bi bi-box-arrow-right me-2"></i>Déconnexion
                    </button>
                </nav>
            </div>
        </div>

        <!-- CONTENU -->
        <div class="col-12 col-lg-9">
            <div class="d-flex align-items-center gap-3 mb-4">
                <a href="mes-annonces.html" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-arrow-left"></i>
                </a>
                <h3 class="fw-bold mb-0">Nouvelle annonce</h3>
            </div>

            <div id="alertContainer"></div>

            <form id="formAnnonce" enctype="multipart/form-data">

                <!-- Informations du bien -->
                <div class="dashboard-card p-4 mb-4">
                    <h5 class="fw-bold mb-4">
                        <i class="bi bi-house text-primary me-2"></i>Informations du bien
                    </h5>
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label fw-semibold">Titre de l'annonce *</label>
                            <input type="text" id="titre" class="form-control"
                                placeholder="Ex: Beau studio meublé à PK19" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">Description *</label>
                            <textarea id="description" class="form-control" rows="5"
                                placeholder="Décrivez le bien en détail..." required></textarea>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Catégorie *</label>
                            <select id="idCategorie" class="form-select" required>
                                <option value="">Sélectionner...</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Type de transaction *</label>
                            <select id="typeTransaction" class="form-select" required>
                                <option value="location">🔑 Location</option>
                                <option value="vente">🏠 Vente</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-semibold">Prix (F CFA) *</label>
                            <input type="number" id="prix" class="form-control"
                                placeholder="120000" required min="0">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-semibold">Surface (m²)</label>
                            <input type="number" id="surfaceM2" class="form-control" placeholder="35">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-semibold">Nb. pièces</label>
                            <input type="number" id="nbPieces" class="form-control" placeholder="2">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-semibold">Nb. chambres</label>
                            <input type="number" id="nbChambres" class="form-control" placeholder="1">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Nb. salles de bain</label>
                            <input type="number" id="nbSallesBain" class="form-control" placeholder="1">
                        </div>
                        <div class="col-md-6 d-flex align-items-end pb-1">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="meuble">
                                <label class="form-check-label fw-semibold" for="meuble">
                                    Bien meublé
                                </label>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Localisation -->
                <div class="dashboard-card p-4 mb-4">
                    <h5 class="fw-bold mb-4">
                        <i class="bi bi-geo-alt text-primary me-2"></i>Localisation
                    </h5>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Ville *</label>
                            <input type="text" id="ville" class="form-control"
                                placeholder="Douala" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Quartier</label>
                            <input type="text" id="quartier" class="form-control" placeholder="PK19">
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">Adresse complète</label>
                            <input type="text" id="adresseComplete" class="form-control"
                                placeholder="Rue 1234, Pk19, Douala">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">
                                Latitude <span class="text-muted fw-normal small">(GPS optionnel)</span>
                            </label>
                            <input type="number" step="any" id="latitude" class="form-control"
                                placeholder="3.8667">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">
                                Longitude <span class="text-muted fw-normal small">(GPS optionnel)</span>
                            </label>
                            <input type="number" step="any" id="longitude" class="form-control"
                                placeholder="11.5167">
                        </div>
                    </div>
                </div>

                <!-- Photos -->
                <div class="dashboard-card p-4 mb-4">
                    <h5 class="fw-bold mb-4">
                        <i class="bi bi-images text-primary me-2"></i>Photos du bien
                    </h5>

                    <div class="border-2 border-dashed rounded-3 p-5 text-center"
                        id="uploadZone"
                        style="border-color:#dee2e6;cursor:pointer;transition:all 0.2s"
                        onclick="document.getElementById('photos').click()"
                        ondragover="event.preventDefault();this.style.borderColor='#0d6efd';this.style.background='#eff6ff'"
                        ondragleave="this.style.borderColor='#dee2e6';this.style.background=''"
                        ondrop="handleDrop(event)">
                        <i class="bi bi-cloud-upload fs-1 text-muted d-block mb-3"></i>
                        <h6 class="fw-semibold text-muted">Cliquez ou glissez vos photos ici</h6>
                        <p class="text-muted small mb-0">JPG, PNG, WEBP — max 5MB par photo</p>
                        <input type="file" id="photos" class="d-none"
                            multiple accept="image/*" onchange="afficherPreviews(this.files)">
                    </div>

                    <div class="row g-2 mt-3" id="previewsContainer"></div>
                </div>

                <!-- Boutons -->
                <div class="d-flex gap-3">
                    <button type="submit" id="btnPublier" class="btn btn-primary btn-lg px-5">
                        <i class="bi bi-send me-2"></i>Publier l'annonce
                    </button>
                    <a href="mes-annonces.html" class="btn btn-outline-secondary btn-lg px-4">
                        Annuler
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>
   // requiertAgent()

    let fichierPhotos = []

    // ── Navbar ───────────────────────────────
    function initNavbar() {
        const user = getUser()
        document.getElementById('navAuth').innerHTML = `
            <div class="d-flex align-items-center gap-2">
                <span class="small fw-semibold">👤 ${user?.prenom}</span>
                <button class="btn btn-outline-danger btn-sm" onclick="deconnexion()">
                    <i class="bi bi-box-arrow-right"></i>
                </button>
            </div>`
    }

    // ── Charger les catégories ───────────────
    async function chargerCategories() {
        try {
            const data = await apiRequest('/annonces')
            // On extrait les catégories uniques des annonces
            // Ou on peut faire une route dédiée
            const cats = [
                {id: 1, libelle: 'appartement'},
                {id: 2, libelle: 'studio'},
                {id: 3, libelle: 'villa'},
                {id: 4, libelle: 'chambre'},
                {id: 5, libelle: 'bureau'},
                {id: 6, libelle: 'terrain'},
            ]
            const select = document.getElementById('idCategorie')
            cats.forEach(c => {
                select.innerHTML += `<option value="${c.id}">${c.libelle}</option>`
            })
        } catch (e) { console.error(e) }
    }

    // ── Afficher les previews photos ─────────
    function afficherPreviews(files) {
        fichierPhotos  = Array.from(files)
        const container = document.getElementById('previewsContainer')

        container.innerHTML = fichierPhotos.map((f, i) => `
            <div class="col-4 col-md-2" id="preview_${i}">
                <div class="position-relative">
                    <img src="${URL.createObjectURL(f)}"
                        class="rounded-3 w-100 border"
                        style="height:80px;object-fit:cover">
                    ${i === 0
                        ? '<span class="position-absolute bottom-0 start-0 badge bg-primary m-1" style="font-size:9px">Principale</span>'
                        : ''}
                    <button type="button"
                        class="position-absolute top-0 end-0 btn btn-danger btn-sm rounded-circle m-1 p-0 d-flex align-items-center justify-content-center"
                        style="width:20px;height:20px;font-size:10px"
                        onclick="supprimerPreview(${i})">
                        <i class="bi bi-x"></i>
                    </button>
                </div>
            </div>
        `).join('')

        if (fichierPhotos.length > 0) {
            document.getElementById('uploadZone').style.borderColor = '#198754'
        }
    }

    // ── Supprimer une preview ────────────────
    function supprimerPreview(index) {
        fichierPhotos.splice(index, 1)
        const dt = new DataTransfer()
        fichierPhotos.forEach(f => dt.items.add(f))
        document.getElementById('photos').files = dt.files
        afficherPreviews(dt.files)
    }

    // ── Drag & Drop ──────────────────────────
    function handleDrop(e) {
        e.preventDefault()
        document.getElementById('uploadZone').style.borderColor = '#dee2e6'
        document.getElementById('uploadZone').style.background  = ''
        const files = e.dataTransfer.files
        const dt    = new DataTransfer()
        Array.from(files).forEach(f => dt.items.add(f))
        document.getElementById('photos').files = dt.files
        afficherPreviews(dt.files)
    }

    // ── Soumettre le formulaire ──────────────
    document.getElementById('formAnnonce').addEventListener('submit', async function(e) {
        e.preventDefault()
        showSpinner('btnPublier', 'Publication...')

        try {
            const formData = new FormData()
            formData.append('titre',             document.getElementById('titre').value)
            formData.append('description',       document.getElementById('description').value)
            formData.append('prix',              document.getElementById('prix').value)
            formData.append('surface_m2',        document.getElementById('surfaceM2').value)
            formData.append('nb_pieces',         document.getElementById('nbPieces').value)
            formData.append('nb_chambres',       document.getElementById('nbChambres').value)
            formData.append('nb_salles_bain',    document.getElementById('nbSallesBain').value)
            formData.append('type_transaction',  document.getElementById('typeTransaction').value)
            formData.append('meuble',            document.getElementById('meuble').checked ? '1' : '0')
            formData.append('id_categorie',      document.getElementById('idCategorie').value)
            formData.append('ville',             document.getElementById('ville').value)
            formData.append('quartier',          document.getElementById('quartier').value)
            formData.append('adresse_complete',  document.getElementById('adresseComplete').value)
            formData.append('latitude',          document.getElementById('latitude').value)
            formData.append('longitude',         document.getElementById('longitude').value)

            // Ajouter les photos
            fichierPhotos.forEach(f => formData.append('photos[]', f))

            await apiFormData('/agent/annonces', formData)

            showAlert('✅ Annonce publiée avec succès !', 'success')
            setTimeout(() => window.location.href = 'mes-annonces.html', 1500)

        } catch (err) {
            const errors = err.data?.errors
            if (errors) {
                const msgs = Object.values(errors).flat().join('<br>')
                showAlert(msgs, 'danger')
            } else {
                showAlert(err.data?.message || 'Erreur lors de la publication.', 'danger')
            }
            hideSpinner('btnPublier', '<i class="bi bi-send me-2"></i>Publier l\'annonce')
        }
    })

    initNavbar()
    chargerCategories()
</script>
</body>
</html>
