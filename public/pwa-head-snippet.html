<!-- ✅ Colle ce bloc dans le <head> de TOUTES tes pages HTML -->

<!-- PWA Simmo -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#4F46E5">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Simmo">
<link rel="apple-touch-icon" href="/images/icon-192.png">

<script>
    // Enregistrement du Service Worker
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/service-worker.js')
                .then(reg => console.log('✅ Simmo SW enregistré:', reg.scope))
                .catch(err => console.error('❌ SW erreur:', err));
        });
    }

    // Bouton d'installation PWA (optionnel)
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;

        // Si tu as un bouton "Installer l'app" dans ton HTML
        const installBtn = document.getElementById('install-btn');
        if (installBtn) {
            installBtn.style.display = 'block';
            installBtn.addEventListener('click', () => {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(choice => {
                    if (choice.outcome === 'accepted') {
                        console.log('✅ App installée');
                    }
                    deferredPrompt = null;
                });
            });
        }
    });
</script>
